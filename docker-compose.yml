services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - backend/.env
    environment:
      FD_CORS_ORIGINS: http://localhost:5173
      FD_IMAGE_DETECTOR: model_a
      FD_MODEL_A_WEIGHTS: /app/artifacts/model_a_v2_1_gpu/model_a_best.pt
      FD_MODEL_A_RUN_MANIFEST: /app/artifacts/model_a_v2_1_gpu/run_manifest.json
      FD_FFMPEG_PATH: /usr/bin/ffmpeg
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/database:/app/backend/database
      - ./vendor/CNNDetection/weights:/app/vendor/CNNDetection/weights:ro
      - ./artifacts:/app/artifacts:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:80"
